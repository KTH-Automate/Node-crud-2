name: Build and Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    with:
      version: '24'

  test:
    uses: ./.github/workflows/test.yaml
    needs: build
    with:
      version: '24'
  
  codeScan:
    uses: ./.github/workflows/sonar.yaml
    secrets: inherit
    
  fileSacn:
    uses: ./.github/workflows/trivy-fs.yaml

  DockerBuild:
    uses: ./.github/workflows/docker.yaml
    secrets: inherit
    needs: test
  
  DcokerScan:
    uses: ./.github/workflows/trivy-scan.yaml
    needs: DockerBuild
